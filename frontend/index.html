<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMU Room Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .search-section {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input[type="datetime-local"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            transition: border-color 0.3s;
        }

        input[type="datetime-local"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-input-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            pointer-events: none;
        }

        .filter-info {
            margin-top: 8px;
            font-size: 13px;
            color: #666;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: black;
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 18px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .results-header h2 {
            color: #333;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .room-card {

            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .room-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .room-name {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .no-results-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .no-results h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #333;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .rooms-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>CMU Room Finder</h1>
            <p>Find available rooms at any time</p>
        </div>

        <div class="card search-section">
            <div class="form-group">
                <label for="datetime">Select Date and Time</label>
                <div class="button-group">
                    <input type="datetime-local" id="datetime" />
                    <button class="btn-secondary" onclick="setNow()">Now</button>
                </div>
            </div>
            <button class="btn-primary" onclick="searchRooms()">Search Free Rooms</button>
        </div>

        <div id="error" style="display: none;" class="error"></div>
        <div id="loading" style="display: none;" class="loading">
            <p>🔄 Loading rooms...</p>
        </div>

        <div id="results" style="display: none;" class="card">
            <div class="results-header">
                <h2>Available Rooms</h2>
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="freeCount">0</div>
                        <div class="stat-label">Free</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="occupiedCount">0</div>
                        <div class="stat-label">Occupied</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                </div>
            </div>
            <div id="selectedTime" style="margin-bottom: 20px; color: #666; font-size: 14px;"></div>
            <div id="filterSection" style="display: none; margin-bottom: 20px;">
                <label for="roomFilter">Filter Rooms</label>
                <div class="search-input-wrapper">
                    <input type="text" id="roomFilter" placeholder="Type to filter by building or room name..."
                        oninput="filterRooms()" />
                    <span class="search-icon">🔍</span>
                </div>
                <div class="filter-info" id="filterInfo"></div>
            </div>
            <div id="roomsList" class="rooms-grid"></div>
        </div>
    </div>

    <script>
        // const API_URL = 'https://api.rooms.scotty.lol';
        const API_URL = 'http://localhost:3001';
        let allRooms = [];

        function setNow() {
            // new date est
            const now = new Date()
            const estTime = new Date(now.getTime() + (-now.getTimezoneOffset() * 60 * 1000));
            // Format: YYYY-MM-DDTHH:MM
            const formatted = estTime.toISOString().slice(0, 16);
            document.getElementById('datetime').value = formatted;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        async function searchRooms() {
            const datetimeInput = document.getElementById('datetime').value;

            if (!datetimeInput) {
                showError('Please select a date and time');
                return;
            }

            const loading = document.getElementById('loading');
            const results = document.getElementById('results');

            loading.style.display = 'block';
            results.style.display = 'none';

            try {
                const datetime = new Date(datetimeInput).toISOString();
                const response = await fetch(`http://localhost:3001/api/free-rooms?datetime=${encodeURIComponent(datetime)}`, {
                    method: 'GET',
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to fetch rooms');
                }

                const data = await response.json();
                displayResults(data);
            } catch (error) {
                console.error('Error:', error);
                showError(error.message || 'Failed to fetch rooms. Make sure the API server is running.');
            } finally {
                loading.style.display = 'none';
            }
        }

        function getCMUMapsLink(room_string) {
            const baseUrl = 'https://maps.scottylabs.org/';
            const BUILDING_CODES = [
                "2SC", "3SC", "4SC", "AH", "AN", "BH", "BR", "CA", "CC", "CFA",
                "CIC", "CUC", "CYH", "DH", "EDS", "FM", "FRB", "GHC", "GL", "GYM",
                "HBH", "HH", "HL", "HOA", "III", "INI", "M19", "MC", "MEL", "MI",
                "MM", "NR", "NSH", "PC", "PCA", "PE", "PH", "PO", "POS", "PTC",
                "RA", "REH", "SC", "SEI", "SH", "TCS", "TEP", "UT", "WEH", "WF",
                "WH", "WQ", "WWG"
            ];
            // get the building code anywhere in the string
            const buildingCode = BUILDING_CODES.find(code => room_string.includes(code));
            // get the room id as the word containing the most digits
            const roomId = room_string.split(' ').reduce((a, b) => {
                return (b.replace(/\D/g, '').length > a.replace(/\D/g, '').length) ? b : a;
            }, '');

            if (buildingCode && roomId) {
                return `${baseUrl}${buildingCode}-${roomId}`;
            }
            return baseUrl;
        }

        function displayResults(data) {
            const results = document.getElementById('results');
            const selectedTime = document.getElementById('selectedTime');
            const filterSection = document.getElementById('filterSection');
            const roomFilter = document.getElementById('roomFilter');

            // Store all rooms globally
            allRooms = data.rooms;

            // Reset filter
            roomFilter.value = '';

            document.getElementById('freeCount').textContent = data.freeRooms;
            document.getElementById('occupiedCount').textContent = data.occupiedRooms;
            document.getElementById('totalCount').textContent = data.totalRooms;

            const formattedDate = new Date(data.datetime).toLocaleString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            selectedTime.textContent = `📅 ${formattedDate}`;

            if (data.rooms.length === 0) {
                filterSection.style.display = 'none';
                renderRooms([]);
            } else {
                filterSection.style.display = 'block';
                renderRooms(allRooms);
            }

            results.style.display = 'block';
        }

        function renderRooms(rooms) {
            const roomsList = document.getElementById('roomsList');
            const filterInfo = document.getElementById('filterInfo');

            if (rooms.length === 0 && allRooms.length === 0) {
                roomsList.innerHTML = `
                    <div class="no-results" style="grid-column: 1/-1;">
                        <div class="no-results-icon">😔</div>
                        <h3>No Free Rooms</h3>
                        <p>All rooms are occupied at this time</p>
                    </div>
                `;
                filterInfo.textContent = '';
            } else if (rooms.length === 0) {
                roomsList.innerHTML = `
                    <div class="no-results" style="grid-column: 1/-1;">
                        <div class="no-results-icon">🔍</div>
                        <h3>No Matching Rooms</h3>
                        <p>Try a different search term</p>
                    </div>
                `;
                filterInfo.textContent = 'No rooms match your filter';
            } else {
                // render room cards with link to cmu maps, remove underlines from room names
                roomsList.innerHTML = rooms
                    .map(room => `
                        <a href="${getCMUMapsLink(room)}" target="_blank" style="text-decoration: none;">
                            <div class="room-card">
                                <div class="room-name">${room.replace(/_/g, ' ')}</div>
                            </div>
                        </a>
                    `)
                    .join('');

                if (rooms.length < allRooms.length) {
                    filterInfo.textContent = `Showing ${rooms.length} of ${allRooms.length} rooms`;
                } else {
                    filterInfo.textContent = `Showing all ${rooms.length} rooms`;
                }
            }
        }

        function filterRooms() {
            const filterValue = document.getElementById('roomFilter').value.toLowerCase().trim();

            if (!filterValue) {
                renderRooms(allRooms);
                return;
            }

            // Filter by subword presence (case-insensitive)
            const filteredRooms = allRooms.filter(room =>
                room.toLowerCase().includes(filterValue)
            );

            renderRooms(filteredRooms);
        }

        // Set current time on page load
        setNow();
    </script>
</body>

</html>
