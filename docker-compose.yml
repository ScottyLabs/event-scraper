# config for browserless, postgres, and our playwright scraper
version: '3.8'
services:
  browserless:
    image: browserless/chrome:latest
    ports:
      - "3000:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=1
      - CONNECTION_TIMEOUT=60000

  postgres:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: scraper_db
    volumes:
      - postgres_data:/var/lib/postgresql

  api:
    build: ./api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/scraper_db
      PORT: 3001
    depends_on:
      - postgres

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
